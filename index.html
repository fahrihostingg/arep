<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arif Fahmi</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
box-sizing:border-box;
}

body{
font-family:"Poppins",sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.card{
width:340px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.08);
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
overflow:hidden;
color:white;
text-align:center;
animation:fade 1.2s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.card-header{
padding:30px 20px 10px 20px;
}

.card-avatar{
width:110px;
height:110px;
border-radius:50%;
border:4px solid rgba(255,255,255,0.3);
object-fit:cover;
margin-bottom:10px;
}

.card-fullname{
font-size:24px;
font-weight:600;
margin:5px 0;
}

.card-jobtitle{
font-size:13px;
opacity:0.8;
}

/* CONTENT */

.card-content{
padding:20px;
font-size:14px;
opacity:0.9;
}

.card-content p{
margin:8px 0;
}

/* SOCIAL */

.card-social{
margin-top:15px;
}

.card-social a{
margin:0 10px;
font-size:22px;
color:white;
transition:0.3s;
}

.card-social a:hover{
color:#00ffd5;
transform:scale(1.2);
text-shadow:0 0 10px #00ffd5;
}

/* BUTTON */

.card-buttons{
display:flex;
border-top:1px solid rgba(255,255,255,0.1);
}

.card-buttons button{
flex:1;
padding:14px;
border:none;
background:transparent;
color:white;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

.card-buttons button:hover{
background:rgba(255,255,255,0.15);
}

</style>
</head>

<body onclick="exec()">

<div class="card">

<div class="card-header">
<img class="card-avatar" src="https://telegra.ph/file/91f95074f25269deb0dc7.jpg">
<h1 class="card-fullname">Arif Fahmi</h1>
<h2 class="card-jobtitle">Arep Galau</h2>
</div>

<div class="card-content">
<p>@Arif</p>
<p>Tetaplah Senyum Walaupun Sedang Sedih</p>
<p>- Aslinya Orang yg suka galau</p>

<div class="card-social">
<a href="https://wa.me/601172590364"><i class="fab fa-whatsapp"></i></a>
<a href="https://instagram.com/rulshz"><i class="fab fa-instagram"></i></a>
<a href="https://github.com/fahrihostingg"><i class="fab fa-github"></i></a>
<a href="https://youtube.com/@rulshzf"><i class="fab fa-youtube"></i></a>
</div>
</div>

<div class="card-buttons">
<button>HOME</button>
<button>ABOUT</button>
<button>CONTACT</button>
</div>

</div>

<audio id="audio">
<source src="https://storage.neko.pe/file/Pd8lNw~74AgVto~G9FWo.mp3" type="audio/mp3">
</audio>

<script>
function exec(){
document.getElementById("audio").play();
}
</script>

</body>
</html>
